server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        return 200 '{"status": "ok"}';
        add_header Content-Type application/json;
    }

    location /admin/ {
        return 403 "Forbidden\n";
    }
}
