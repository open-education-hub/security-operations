# Splunk Universal Forwarder inputs.conf
# Monitors log files and assigns sourcetypes

[monitor:///var/log/nginx/access.log]
sourcetype = access_combined
index = main

[monitor:///var/log/demo/auth_events.log]
sourcetype = auth_events
index = main

[monitor:///var/log/demo/sysmon.log]
sourcetype = sysmon_json
index = main
