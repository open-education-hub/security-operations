
services:
  # ─── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: demo02-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - demo-net

  # ─── Kibana ─────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: demo02-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - demo-net

  # ─── Logstash (Normalization Engine) ────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: demo02-logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx512m"
    volumes:
      - ./config/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./config/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5000:5000/tcp"   # Apache format input
      - "5001:5001/tcp"   # CEF input
      - "5002:5002/tcp"   # JSON input
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - demo-net

  # ─── Log Producer (sends sample events in all 3 formats) ────────────────────
  log-producer:
    image: python:3.12-slim
    container_name: demo02-log-producer
    volumes:
      - ./scripts/produce_logs.py:/app/produce_logs.py:ro
    command: >
      sh -c "sleep 30 && pip install faker --quiet && python /app/produce_logs.py"
    depends_on:
      - logstash
    networks:
      - demo-net
    restart: unless-stopped

volumes:
  esdata:

networks:
  demo-net:
    driver: bridge
