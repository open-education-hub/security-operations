# ============================================================
# Logstash Normalization Pipeline — Demo 02
# Accepts 3 different log formats and normalizes to ECS
# ============================================================

# ─── INPUTS ─────────────────────────────────────────────────
input {
  # Port 5000: Apache Combined Log Format
  tcp {
    port  => 5000
    codec => line
    tags  => ["apache", "http_access"]
  }

  # Port 5001: CEF (Common Event Format)
  tcp {
    port  => 5001
    codec => line
    tags  => ["cef", "firewall"]
  }

  # Port 5002: Custom JSON format
  tcp {
    port  => 5002
    codec => json_lines
    tags  => ["custom_json", "webapp"]
  }
}

# ─── FILTERS ────────────────────────────────────────────────
filter {

  # ── Apache Combined Log Format ──────────────────────────
  if "apache" in [tags] {
    grok {
      match => {
        "message" => '%{IPORHOST:source_ip} - %{DATA:user_name} \[%{HTTPDATE:raw_timestamp}\] "%{WORD:http_method} %{URIPATHPARAM:url_path} HTTP/%{NUMBER:http_version}" %{NUMBER:http_status_code:int} %{NUMBER:http_response_bytes:int} "%{DATA:http_referrer}" "%{DATA:user_agent_string}"'
      }
      tag_on_failure => ["_grokparsefailure_apache"]
    }

    # Parse timestamp from Apache format
    date {
      match    => ["raw_timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target   => "@timestamp"
      timezone => "UTC"
    }

    # Rename to ECS fields
    mutate {
      rename => {
        "source_ip"           => "[source][ip]"
        "user_name"           => "[user][name]"
        "http_method"         => "[http][request][method]"
        "url_path"            => "[url][path]"
        "http_status_code"    => "[http][response][status_code]"
        "http_response_bytes" => "[http][response][bytes]"
        "http_referrer"       => "[http][request][referrer]"
        "user_agent_string"   => "[user_agent][original]"
      }
      add_field => {
        "[event][category]"      => "web"
        "[event][type]"          => "access"
        "[data_stream][dataset]" => "apache.access"
      }
      remove_field => ["raw_timestamp", "http_version", "message"]
    }
  }

  # ── CEF Format ──────────────────────────────────────────
  if "cef" in [tags] {
    # Parse CEF header
    grok {
      match => {
        "message" => "CEF:%{INT:cef_version}\|%{DATA:cef_vendor}\|%{DATA:cef_product}\|%{DATA:cef_dev_version}\|%{DATA:cef_signature}\|%{DATA:cef_name}\|%{INT:cef_severity}\|%{GREEDYDATA:cef_extension}"
      }
      tag_on_failure => ["_grokparsefailure_cef"]
    }

    # Parse CEF extension key=value pairs
    kv {
      source       => "cef_extension"
      field_split  => " "
      value_split  => "="
      target       => "cef_fields"
    }

    # Map CEF fields to ECS
    mutate {
      rename => {
        "[cef_fields][src]"    => "[source][ip]"
        "[cef_fields][dst]"    => "[destination][ip]"
        "[cef_fields][spt]"    => "[source][port]"
        "[cef_fields][dpt]"    => "[destination][port]"
        "[cef_fields][proto]"  => "[network][transport]"
        "[cef_fields][act]"    => "[event][action]"
        "[cef_fields][suser]"  => "[user][name]"
        "[cef_fields][msg]"    => "[message]"
        "cef_name"             => "[rule][name]"
        "cef_severity"         => "[event][severity]"
      }
      add_field => {
        "[event][category]"      => "network"
        "[data_stream][dataset]" => "firewall.traffic"
        "[observer][vendor]"     => "%{[cef_vendor]}"
        "[observer][product]"    => "%{[cef_product]}"
      }
      remove_field => ["cef_extension", "cef_fields", "cef_version",
                       "cef_vendor", "cef_product", "cef_dev_version",
                       "cef_signature"]
    }

    # Convert port to integer
    mutate {
      convert => {
        "[source][port]"      => "integer"
        "[destination][port]" => "integer"
        "[event][severity]"   => "integer"
      }
    }
  }

  # ── Custom JSON Format ───────────────────────────────────
  if "custom_json" in [tags] {
    # Incoming JSON fields: ts, remote_ip, method, path, code, agent

    # Parse timestamp
    date {
      match  => ["ts", "ISO8601"]
      target => "@timestamp"
    }

    mutate {
      rename => {
        "remote_ip" => "[source][ip]"
        "method"    => "[http][request][method]"
        "path"      => "[url][path]"
        "code"      => "[http][response][status_code]"
        "agent"     => "[user_agent][original]"
      }
      add_field => {
        "[event][category]"      => "web"
        "[event][type]"          => "access"
        "[data_stream][dataset]" => "webapp.access"
      }
      remove_field => ["ts", "message"]
    }
  }

  # ── GeoIP Enrichment (applies to all sources with source.ip) ──
  if [source][ip] {
    geoip {
      source => "[source][ip]"
      target => "[source][geo]"
      fields => ["city_name", "country_name", "country_iso_code",
                 "region_name", "location"]
    }
  }

  # ── Common ECS fields for all events ────────────────────
  mutate {
    add_field => {
      "[ecs][version]"          => "8.11.0"
      "[event][ingested]"       => "%{[@metadata][beat]}"
      "[host][name]"            => "logstash-demo02"
    }
  }
}

# ─── OUTPUT ─────────────────────────────────────────────────
output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "security-normalized-%{+YYYY.MM.dd}"
  }

  # Also print to stdout for debugging
  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
