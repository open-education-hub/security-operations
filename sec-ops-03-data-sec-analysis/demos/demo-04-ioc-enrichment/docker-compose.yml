
services:
  # ─── MISP (Malware Information Sharing Platform) ─────────────────────────────
  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: demo04-misp
    environment:
      - MISP_BASEURL=http://localhost
      - MISP_EMAIL=admin@admin.test
      - MISP_PASSWORD=admin
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_db_password
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      misp-db:
        condition: service_healthy
    volumes:
      - misp-data:/var/www/MISP
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "http://localhost/users/login"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s

  # ─── MISP Database ───────────────────────────────────────────────────────────
  misp-db:
    image: mysql:8.0
    container_name: demo04-misp-db
    environment:
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_db_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "misp", "-pmisp_db_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── MISP Populator (loads sample IOCs) ──────────────────────────────────────
  misp-populate:
    image: python:3.12-slim
    container_name: demo04-misp-populate
    volumes:
      - ./scripts:/app/scripts:ro
      - ./populate:/populate:ro
    command: >
      sh -c "pip install pymisp requests --quiet &&
             sleep 120 &&
             python3 /populate/populate_misp.py"
    environment:
      - MISP_URL=http://misp
      - MISP_KEY=YOUR_MISP_API_KEY
    depends_on:
      misp:
        condition: service_healthy
    networks:
      - demo-net

  # ─── Alert Processor (enrichment microservice) ───────────────────────────────
  alert-processor:
    image: python:3.12-slim
    container_name: demo04-alert-processor
    volumes:
      - ./scripts:/app/scripts:ro
    command: >
      sh -c "pip install pymisp requests --quiet &&
             sleep 150 &&
             python3 /app/scripts/alert_processor.py"
    environment:
      - MISP_URL=http://misp
      - MISP_KEY=YOUR_MISP_API_KEY
      - VT_API_KEY=${VT_API_KEY:-}
    depends_on:
      misp:
        condition: service_healthy
    networks:
      - demo-net

volumes:
  misp-data:
  misp-db-data:

networks:
  demo-net:
    driver: bridge
