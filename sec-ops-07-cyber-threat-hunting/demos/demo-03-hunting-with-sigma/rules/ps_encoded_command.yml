title: PowerShell Execution with Encoded Command
id: 4a5e2f1b-3c7d-4e8a-9b0c-1d2e3f4a5b6c
status: experimental
description: |
  Detects PowerShell or PowerShell Core execution using encoded command
  parameters, commonly used by threat actors to obfuscate malicious scripts
  and bypass simple command-line logging.

  FIN-STORM has been observed using this technique for staging (T1059.001).
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_powershell_exe
author: SecureBank Threat Hunt Team
date: 2024/03/15
modified: 2024/03/15
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_encoded:
    CommandLine|contains:
      - ' -EncodedCommand '
      - ' -encodedcommand '
      - ' -enc '
      - ' -ec '
  selection_evasion:
    CommandLine|contains:
      - '-w hidden'
      - '-WindowStyle Hidden'
      - '-NonI'
      - '-NonInteractive'
      - '-Exec Bypass'
      - '-ExecutionPolicy Bypass'
  condition: selection_image and (selection_encoded or selection_evasion)
falsepositives:
  - Legitimate administrative scripts using encoded commands
  - Software deployment tools (SCCM, PDQ Deploy, etc.)
  - Some security tools (verify before acting)
level: medium
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
