
# Demo 04: TheHive + Cortex + MISP Ticketing Integration
# Provides: Case management, automated IOC analysis, threat intel sharing

services:

  # ── TheHive Case Management ──────────────────────────────────────────────────

  thehive:
    image: strangebee/thehive:5.3
    container_name: thehive
    hostname: thehive
    depends_on:
      cassandra:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      cortex:
        condition: service_started
    ports:
      - "9000:9000"
    environment:
      - JVM_OPTS=-Xms512m -Xmx1g
    volumes:
      - ./config/thehive/application.conf:/etc/thehive/application.conf:ro
      - thehive-data:/opt/thehive/data
      - thehive-index:/opt/thehive/index
    networks:
      - soc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── Cortex IOC Analysis Engine ───────────────────────────────────────────────

  cortex:
    image: thehiveproject/cortex:3.1.8
    container_name: cortex
    hostname: cortex
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "9001:9001"
    environment:
      - JVM_OPTS=-Xms512m -Xmx1g
    volumes:
      - ./config/cortex/application.conf:/etc/cortex/application.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /tmp/cortex-jobs:/tmp/cortex-jobs
    networks:
      - soc-net
    restart: unless-stopped

  # ── Cassandra DB (TheHive backend) ───────────────────────────────────────────

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    hostname: cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=thehive
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - HEAP_NEWSIZE=256M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - soc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Elasticsearch (TheHive + Cortex indexing) ─────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.14
    container_name: elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.name=soc-cluster
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - soc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── MISP Threat Intelligence Platform ───────────────────────────────────────

  misp:
    image: coolacid/misp-docker:core-latest
    container_name: misp
    hostname: misp
    depends_on:
      - misp-db
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misppassword2026
      - MISP_ADMIN_EMAIL=admin@soc-lab.local
      - MISP_ADMIN_PASSPHRASE=MISPAdmin2026!
      - MISP_BASEURL=http://localhost:8080
      - TIMEZONE=UTC
    volumes:
      - misp-data:/var/www/MISP/app/files
    networks:
      - soc-net
    restart: unless-stopped
    profiles:
      - misp  # Optional: start with --profile misp

  misp-db:
    image: mariadb:10.11
    container_name: misp-db
    hostname: misp-db
    environment:
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misppassword2026
      - MYSQL_ROOT_PASSWORD=misproot2026
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      - soc-net
    restart: unless-stopped
    profiles:
      - misp

networks:
  soc-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  thehive-data:
  thehive-index:
  cassandra-data:
  elastic-data:
  misp-data:
  misp-db-data:
