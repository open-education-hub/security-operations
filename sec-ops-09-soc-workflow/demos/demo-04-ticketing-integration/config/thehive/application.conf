# TheHive 5 minimal configuration for SOC lab
# Cassandra backend
db.janusgraph {
  storage.backend: cql
  storage.cql.cluster-name: thehive
  storage.hostname: ["cassandra"]
  storage.port: 9042
  storage.cql.local-datacenter: dc1
}
# Elasticsearch indexing
index.search {
  backend: elasticsearch
  elasticsearch.url: ["http://elasticsearch:9200"]
  index.name: thehive
}
# Application
application.baseUrl: "http://localhost:9000"
play.http.secret.key: "ThisIsASecretKeyForSOCLabOnlyNotForProduction"
