
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    container_name: es-thehive
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 6

  thehive:
    image: strangebee/thehive:5.2
    container_name: thehive
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - JVM_OPTS=-Xms512m -Xmx512m
    ports:
      - "9000:9000"
    command:
      - --storage
      - elasticsearch
      - --es-uri
      - http://elasticsearch:9200
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9000/api/status"]
      interval: 20s
      timeout: 10s
      retries: 8

  cortex:
    image: thehiveproject/cortex:3.1.7
    container_name: cortex
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - JVM_OPTS=-Xms512m -Xmx512m
    ports:
      - "9001:9001"
    volumes:
      - cortex-jobs:/tmp/cortex-jobs

volumes:
  es-data:
  cortex-jobs:
