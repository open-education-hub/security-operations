server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Access log — plain combined format (matches Apache Combined Log for Kibana parsing)
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Serve the login page
    location / {
        try_files $uri $uri/ =404;
    }

    # Simulate a login endpoint — always returns 401 unless the body is the
    # "correct" credential (log-generator handles the 302 separately via ES).
    location = /login {
        # For brute-force simulation nginx returns 401; the Python generator
        # logs the correct status directly to ES regardless of what nginx does.
        return 401;
    }

    # Simulate the search endpoint (targeted by SQL injection events)
    location /search {
        return 400;
    }

    # Simulate the patient records export endpoint
    location = /export/patients.csv {
        # Return a dummy 1-byte CSV so nginx doesn't 404.
        # The actual 10 MB byte count is recorded in Elasticsearch by the generator.
        default_type text/csv;
        return 200 "id,name,dob,diagnosis\n";
    }

    # Simulate other portal pages
    location /dashboard    { return 302 /; }
    location /profile      { return 302 /; }
    location /appointments { return 200 "Appointments\n"; }
    location /messages     { return 200 "Messages\n"; }
    location /forgot-password { return 200 "Forgot password\n"; }
    location /register     { return 200 "Register\n"; }
}
