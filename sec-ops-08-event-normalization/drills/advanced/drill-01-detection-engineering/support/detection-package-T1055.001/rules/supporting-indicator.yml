# Supporting Indicator Rule: T1055.001 — Complementary DLL Injection Signal
# Security Operations Course - Session 08, Drill 01 (Advanced)
#
# [STUDENT TASK — Part 3.2]
# Complete this Sigma rule using a DIFFERENT data source from the primary rule.
#
# Your primary rule uses Sysmon EventID 8 (CreateRemoteThread).
# This supporting rule should use a different Sysmon event or Windows log.
#
# Options to consider:
#   - Sysmon EventID 10 (ProcessAccess): OpenProcess with high-access mask
#     → A precursor step: attacker must call OpenProcess before WriteProcessMemory
#   - Sysmon EventID 7 (ImageLoaded): Unsigned DLL loaded into an unexpected process
#     → After injection, the DLL will appear in the target's module list
#   - Windows EventID 4688: Process creation with suspicious parent/child
#
# Hint: A combination of EventID 10 (VirtualAllocEx/WriteProcessMemory proxy)
# followed by EventID 8 (CreateRemoteThread) is very high confidence.
#
# =============================================================================

