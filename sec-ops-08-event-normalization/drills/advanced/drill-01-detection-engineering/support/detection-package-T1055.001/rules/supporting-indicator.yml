detection:
    selection:
        # [STUDENT TASK: Define your detection criteria]
        # If using EventID 10 (ProcessAccess), consider:
        #   GrantedAccess: "0x1fffff"  (PROCESS_ALL_ACCESS)
        #   or a combination of flags indicating write + create thread
        # If using EventID 7 (ImageLoaded), consider:
        #   Signed: "false"  (unsigned DLL loaded into unexpected location)
        #   ImageLoaded|contains: certain paths that shouldn't have DLLs

    filter_legitimate:
        # [STUDENT TASK: Add false positive exclusions for your chosen data source]

    condition: selection and not filter_legitimate

