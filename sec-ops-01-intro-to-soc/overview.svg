  <text x="380" y="664" font-size="10" fill="#93c5fd">Init Access</text>
  <text x="450" y="664" font-size="10" fill="#93c5fd">Execution</text>
  <text x="520" y="664" font-size="10" fill="#93c5fd">Persistence</text>
  <text x="600" y="664" font-size="10" fill="#93c5fd">Priv Esc</text>
  <text x="660" y="664" font-size="10" fill="#93c5fd">Lateral Mv</text>
  <text x="730" y="664" font-size="10" fill="#93c5fd">Collection</text>
  <text x="800" y="664" font-size="10" fill="#93c5fd">Exfiltration</text>

