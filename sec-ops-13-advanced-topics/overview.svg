<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 22px; font-weight: bold; fill: #e6edf3; }
      .subtitle { font-size: 13px; fill: #8b949e; }
      .box-title { font-size: 13px; font-weight: bold; fill: #e6edf3; }
      .box-text { font-size: 11px; fill: #c9d1d9; }
      .label { font-size: 11px; fill: #8b949e; }
