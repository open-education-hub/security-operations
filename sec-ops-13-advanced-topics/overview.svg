  <text x="492" y="294" class="box-text" text-anchor="middle" font-weight="bold" fill="#3fb950">SOAR Capabilities</text>
  <text x="420" y="310" class="box-text" fill="#8b949e">Automated playbooks</text>
  <text x="420" y="324" class="box-text" fill="#8b949e">Alert triage / enrichment</text>
  <text x="420" y="338" class="box-text" fill="#8b949e">IP/domain lookup</text>
  <text x="420" y="352" class="box-text" fill="#8b949e">Ticket creation auto</text>
  <text x="420" y="366" class="box-text" fill="#8b949e">MTTR reduction</text>
