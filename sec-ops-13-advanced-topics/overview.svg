  <text x="815" y="310" class="box-text" fill="#8b949e">L1: Initial / reactive</text>
  <text x="815" y="324" class="box-text" fill="#8b949e">L2: Defined processes</text>
  <text x="815" y="338" class="box-text" fill="#8b949e">L3: Proactive hunting</text>
  <text x="815" y="352" class="box-text" fill="#8b949e">L4: Threat intel-driven</text>
  <text x="815" y="366" class="box-text" fill="#8b949e">L5: Continuous learning</text>
  <rect x="980" y="278" width="175" height="106" rx="5" fill="#1a1a2e" stroke="#a371f7" stroke-width="1"/>
  <text x="1067" y="294" class="box-text" text-anchor="middle" font-weight="bold" fill="#a371f7">Key KPIs</text>
  <text x="990" y="310" class="box-text" fill="#8b949e">MTTD / MTTR / MTTC</text>
  <text x="990" y="324" class="box-text" fill="#8b949e">False positive rate</text>
  <text x="990" y="338" class="box-text" fill="#8b949e">Alert volume trend</text>
  <text x="990" y="352" class="box-text" fill="#8b949e">Detection coverage %</text>
  <text x="990" y="366" class="box-text" fill="#8b949e">Playbook exec rate</text>

