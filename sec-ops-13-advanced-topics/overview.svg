  <text x="205" y="270" class="box-title" text-anchor="middle" fill="#ff7b72">Purple Teaming</text>
  <rect x="45" y="278" width="148" height="106" rx="5" fill="#1a0d0d" stroke="#ff7b72" stroke-width="1"/>
  <text x="119" y="294" class="box-text" text-anchor="middle" font-weight="bold" fill="#ff7b72">Red Team</text>
  <text x="55" y="310" class="box-text" fill="#8b949e">Adversary simulation</text>
  <text x="55" y="324" class="box-text" fill="#8b949e">ATT&amp;CK technique use</text>
  <text x="55" y="338" class="box-text" fill="#8b949e">Assume-breach testing</text>
  <text x="55" y="352" class="box-text" fill="#8b949e">C2 infrastructure</text>
  <text x="55" y="366" class="box-text" fill="#8b949e">Lateral movement drills</text>
  <rect x="203" y="278" width="163" height="106" rx="5" fill="#0d2d1a" stroke="#56d364" stroke-width="1"/>
