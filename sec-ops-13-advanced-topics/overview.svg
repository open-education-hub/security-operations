  <text x="230" y="717" class="box-text" fill="#8b949e">User behaviour monitoring</text>
  <text x="230" y="731" class="box-text" fill="#8b949e">Consent for DLP tools</text>
  <text x="230" y="745" class="box-text" fill="#8b949e">Anonymise in testing</text>

