  <!-- Background -->
  <rect width="1200" height="800" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="38" class="title" text-anchor="middle">Session 13: Advanced Topics in Cybersecurity</text>
  <text x="600" y="58" class="subtitle" text-anchor="middle">Cloud Security · Zero Trust · Threat Intel · Purple Teaming · AI · Regulations</text>

  <!-- ====== TOP-LEFT: Cloud Security ====== -->
  <rect x="30" y="75" width="350" height="155" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="205" y="97" class="box-title" text-anchor="middle" fill="#58a6ff">Cloud Security</text>
  <!-- Shared responsibility -->
  <rect x="45" y="105" width="148" height="112" rx="5" fill="#0d1f3c" stroke="#388bfd" stroke-width="1"/>
  <text x="119" y="121" class="box-text" text-anchor="middle" font-weight="bold" fill="#79c0ff">Shared Responsibility</text>
  <text x="55" y="137" class="box-text" fill="#8b949e">IaaS: OS/Apps by customer</text>
  <text x="55" y="151" class="box-text" fill="#8b949e">PaaS: Data/Identity</text>
  <text x="55" y="165" class="box-text" fill="#8b949e">SaaS: Data/Access only</text>
  <text x="55" y="179" class="box-text" fill="#8b949e">Logging: CloudTrail/Azure</text>
  <text x="55" y="193" class="box-text" fill="#8b949e">Activity Log/GCP Audit</text>
  <!-- Cloud threats -->
  <rect x="203" y="105" width="163" height="112" rx="5" fill="#1a0d0d" stroke="#ff7b72" stroke-width="1"/>
  <text x="285" y="121" class="box-text" text-anchor="middle" font-weight="bold" fill="#ff7b72">Cloud Threats</text>
  <text x="213" y="137" class="box-text" fill="#8b949e">Misconfigured storage</text>
  <text x="213" y="151" class="box-text" fill="#8b949e">Overprivileged IAM</text>
  <text x="213" y="165" class="box-text" fill="#8b949e">Exposed cloud console</text>
  <text x="213" y="179" class="box-text" fill="#8b949e">Lateral movement via roles</text>
  <text x="213" y="193" class="box-text" fill="#8b949e">Shadow IT</text>

  <!-- ====== TOP-CENTER: Zero Trust ====== -->
  <rect x="395" y="75" width="380" height="155" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="585" y="97" class="box-title" text-anchor="middle" fill="#d2a8ff">Zero Trust Architecture</text>
  <!-- Pillars -->
  <rect x="410" y="105" width="165" height="112" rx="5" fill="#1a1a2e" stroke="#d2a8ff" stroke-width="1"/>
  <text x="492" y="121" class="box-text" text-anchor="middle" font-weight="bold" fill="#d2a8ff">Core Pillars</text>
  <text x="420" y="137" class="box-text" fill="#8b949e">Never trust, always verify</text>
  <text x="420" y="151" class="box-text" fill="#8b949e">Least-privilege access</text>
  <text x="420" y="165" class="box-text" fill="#8b949e">Micro-segmentation</text>
  <text x="420" y="179" class="box-text" fill="#8b949e">Continuous validation</text>
  <text x="420" y="193" class="box-text" fill="#8b949e">Identity is the perimeter</text>
  <!-- Controls -->
  <rect x="585" y="105" width="175" height="112" rx="5" fill="#1a1a2e" stroke="#a371f7" stroke-width="1"/>
  <text x="672" y="121" class="box-text" text-anchor="middle" font-weight="bold" fill="#a371f7">Key Controls</text>
  <text x="595" y="137" class="box-text" fill="#8b949e">MFA everywhere</text>
  <text x="595" y="151" class="box-text" fill="#8b949e">ZTNA / BeyondCorp</text>
  <text x="595" y="165" class="box-text" fill="#8b949e">Identity-aware proxy</text>
  <text x="595" y="179" class="box-text" fill="#8b949e">Device health checks</text>
  <text x="595" y="193" class="box-text" fill="#8b949e">Encrypted all-links</text>

  <!-- ====== TOP-RIGHT: Threat Intelligence ====== -->
  <rect x="790" y="75" width="380" height="155" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="980" y="97" class="box-title" text-anchor="middle" fill="#e3b341">Threat Intelligence (STIX/TAXII)</text>
  <rect x="805" y="105" width="165" height="112" rx="5" fill="#1c1c0e" stroke="#e3b341" stroke-width="1"/>
  <text x="887" y="121" class="box-text" text-anchor="middle" font-weight="bold" fill="#e3b341">STIX Objects</text>
  <text x="815" y="137" class="box-text" fill="#8b949e">Indicator (IP, hash, domain)</text>
  <text x="815" y="151" class="box-text" fill="#8b949e">Threat Actor</text>
  <text x="815" y="165" class="box-text" fill="#8b949e">Campaign / Attack Pattern</text>
  <text x="815" y="179" class="box-text" fill="#8b949e">Course of Action</text>
  <text x="815" y="193" class="box-text" fill="#8b949e">Malware / Tool</text>
  <rect x="980" y="105" width="175" height="112" rx="5" fill="#1c1c0e" stroke="#ffa657" stroke-width="1"/>
  <text x="1067" y="121" class="box-text" text-anchor="middle" font-weight="bold" fill="#ffa657">TAXII &amp; Feeds</text>
  <text x="990" y="137" class="box-text" fill="#8b949e">TAXII Server/Client</text>
  <text x="990" y="151" class="box-text" fill="#8b949e">Collection / Channel</text>
  <text x="990" y="165" class="box-text" fill="#8b949e">MISP, OpenCTI</text>
  <text x="990" y="179" class="box-text" fill="#8b949e">ISAC feeds (FS-ISAC, H-ISAC)</text>
  <text x="990" y="193" class="box-text" fill="#8b949e">AlienVault OTX, VirusTotal</text>

