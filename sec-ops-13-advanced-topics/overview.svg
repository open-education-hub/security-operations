  <text x="55" y="731" class="box-text" fill="#8b949e">DPIA for high-risk</text>
  <text x="55" y="745" class="box-text" fill="#8b949e">Lawful basis for logs</text>
  <rect x="220" y="671" width="165" height="92" rx="5" fill="#1a1a2e" stroke="#a371f7" stroke-width="1"/>
