  <text x="213" y="310" class="box-text" fill="#8b949e">Detection coverage map</text>
  <text x="213" y="324" class="box-text" fill="#8b949e">Alert tuning + triage</text>
  <text x="213" y="338" class="box-text" fill="#8b949e">Playbook improvement</text>
  <text x="213" y="352" class="box-text" fill="#8b949e">SOC visibility gaps</text>
  <text x="213" y="366" class="box-text" fill="#8b949e">SIEM rule updates</text>

